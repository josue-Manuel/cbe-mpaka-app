workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 30
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App (Vite)
        script: npm run build
      - name: Add and Sync Capacitor Android
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Fix Gradle Wrapper
        script: |
          cd android/gradle/wrapper
          curl -L -o gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
