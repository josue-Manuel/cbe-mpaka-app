workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 30
    environment:
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web App (Vite)
        script: npm run build
      - name: Clean and Sync Capacitor Android
        script: |
          # Cette ligne supprime le dossier corrompu s'il existe
          rm -rf android
          npx cap add android
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
